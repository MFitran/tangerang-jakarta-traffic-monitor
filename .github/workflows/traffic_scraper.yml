name: Sync Traffic Geometry to Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'ingest_traffic_geometry.py'   # Berjalan jika file koordinat ini berubah
  schedule:
    - cron: '0 * * * *'                 # 📅 OTOMATIS: Berjalan setiap jam (pada menit ke-0)
  workflow_dispatch:                    # Mengizinkan tombol manual di dashboard GitHub

jobs:
  sync-coordinates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          else 
            pip install supabase numpy requests
          fi

      - name: Execute Ingestion Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          TOMTOM_TRAFFIC_API: ${{ TOMTOM_TRAFFIC_API }}
        run: python ingest_traffic_geometry.py